<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garimpo Digital — Ofertas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --gold: #F5C518;
    --gold-dark: #D4A017;
    --gold-light: #FFE066;
    --black: #0A0A0A;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #242424;
    --green: #22C55E;
    --text: #F0F0F0;
    --muted: #888;
  }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background particles */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(245,197,24,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(245,197,24,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 16px 40px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 24px;
  }

  .logo-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-icon {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 20px rgba(245,197,24,0.3);
  }

  .logo-text {
    text-align: left;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }

  .logo-text p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto;
  }

  /* Oferta atual badge */
  .badge-atual {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,197,24,0.1);
    border: 1px solid rgba(245,197,24,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Card principal */
  .card-produto {
    background: var(--dark2);
    border: 1px solid rgba(245,197,24,0.15);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 16px;
    transition: border-color 0.3s;
  }

  .card-produto:hover {
    border-color: rgba(245,197,24,0.4);
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: var(--dark3);
  }

  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--dark3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
  }

  .card-body {
    padding: 20px;
  }

  .card-titulo {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-preco-wrap {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-preco {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    color: var(--gold);
    letter-spacing: 1px;
    line-height: 1;
  }

  .card-desconto {
    background: var(--green);
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 8px;
  }

  .card-avaliacao {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .stars {
    color: var(--gold);
    font-size: 14px;
  }

  /* Botão CTA */
  .btn-cta {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    color: var(--black);
    text-decoration: none;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    border-radius: 12px;
    letter-spacing: 0.5px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(245,197,24,0.3);
  }

  .btn-cta:active {
    transform: scale(0.98);
  }

  .btn-cta:hover {
    box-shadow: 0 6px 28px rgba(245,197,24,0.5);
    transform: translateY(-1px);
  }

  /* Info strip */
  .info-strip {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .info-pill {
    flex: 1;
    background: var(--dark3);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.05);
  }

  .info-pill strong {
    display: block;
    font-size: 13px;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 2px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding-top: 24px;
  }

  .footer p {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .social-links {
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .social-link {
    background: var(--dark3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s, border-color 0.2s;
  }

  .social-link:hover {
    color: var(--gold);
    border-color: rgba(245,197,24,0.3);
  }

  /* Atualizado em */
  .atualizado {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="container">

  <header class="header">
    <div class="logo-wrap">
      <div class="logo-icon">🔍</div>
      <div class="logo-text">
        <h1>Garimpo Digital</h1>
        <p>Garimpe • Compare • Economize</p>
      </div>
    </div>
    <div class="divider"></div>
    <div class="badge-atual">
      <span class="badge-dot"></span>
      Oferta atual
    </div>
  </header>

  <div class="card-produto">
    <img class="card-img" id="produto-img" src="" alt="" onerror="this.style.display='none'; document.getElementById('img-placeholder').style.display='flex';">
    <div class="card-img-placeholder" id="img-placeholder" style="display:none;">🛍️</div>
    <div class="card-body">
      <p class="card-titulo" id="produto-titulo">Carregando oferta...</p>
      
      <div class="card-preco-wrap">
        <span class="card-preco" id="produto-preco">—</span>
        <span class="card-desconto" id="produto-desconto" style="display:none;"></span>
      </div>

      <div class="info-strip">
        <div class="info-pill">
          <strong>✓ Frete</strong>
          Grátis
        </div>
        <div class="info-pill">
          <strong id="produto-origem">Shopee</strong>
          Afiliado
        </div>
        <div class="info-pill">
          <strong>🔥 Hot</strong>
          Hoje
        </div>
      </div>

      <a class="btn-cta" id="produto-link" href="#" target="_blank">
        🛒 Quero essa oferta
      </a>
    </div>
  </div>

  <p class="atualizado" id="atualizado">Atualizado agora</p>

  <footer class="footer">
    <p>Siga o Garimpo Digital</p>
    <div class="social-links">
      <a class="social-link" href="https://t.me/garimpodigital_cm" target="_blank">📢 Telegram</a>
      <a class="social-link" href="https://instagram.com/garimpodigital_cmofc" target="_blank">📸 Instagram</a>
    </div>
  </footer>

</div>

<script>
const DADOS_URL = 'https://raw.githubusercontent.com/garimpodigitalcm/Ofertas/main/oferta.json';

async function carregarOferta() {
  try {
    const r = await fetch(DADOS_URL + '?t=' + Date.now());
    const d = await r.json();
    
    document.title = 'Garimpo Digital — ' + d.titulo;
    document.getElementById('produto-titulo').textContent = d.titulo;
    document.getElementById('produto-preco').textContent = 'R$ ' + parseFloat(d.preco).toFixed(2).replace('.', ',');
    document.getElementById('produto-link').href = d.link;
    
    if (d.imagem) {
      const img = document.getElementById('produto-img');
      img.src = d.imagem;
      img.alt = d.titulo;
      img.style.display = 'block';
    }

    if (d.desconto && d.desconto > 0) {
      const el = document.getElementById('produto-desconto');
      el.textContent = '-' + d.desconto + '%';
      el.style.display = 'inline-block';
    }

    if (d.origem) {
      document.getElementById('produto-origem').textContent = d.origem === 'ml' ? 'Mercado Livre' : 'Shopee';
    }

    if (d.atualizado) {
      document.getElementById('atualizado').textContent = 'Atualizado: ' + d.atualizado;
    }

  } catch(e) {
    document.getElementById('produto-titulo').textContent = 'Acompanhe nossas ofertas no Telegram e Instagram!';
    document.getElementById('produto-preco').textContent = '';
    document.getElementById('produto-link').textContent = '📢 Ver todas as ofertas';
    document.getElementById('produto-link').href = 'https://t.me/garimpodigital_cm';
  }
}

carregarOferta();
</script>

</body>
</html>
